name: Update PR version in footer

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set PR number in footer
        run: |
          # Werkt het PR-nummer bij in beide plekken ("Version PR<nummer>"): de
          # footer (#version) én het loginscherm (#versionFront). Het tijd-deel
          # (" - HH:MM") laten we staan; de app zet de definitieve tekst runtime.
          sed -i -E 's#(Serkan Yapiyor Bu Isi - Version PR)[0-9]+#\1${{ github.event.pull_request.number }}#g' index.html

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- index.html; then
            git add index.html
            git commit -m "Update footer version to PR #${{ github.event.pull_request.number }}"
            git push
          else
            echo "No change needed."
          fi
